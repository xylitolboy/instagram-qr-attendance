<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <title>WAUSAN30 — Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Lexend:wght@400;700;800&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/qrious@4.0.2/dist/qrious.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --black:  #1C1C1C;
      --black2: #242424;
      --red:    #CC0000;
      --gold:   #CAB895;
      --white:  #F9F9F9;
      --muted:  rgba(249,249,249,0.45);
      --border: rgba(249,249,249,0.1);
      --card:   rgba(249,249,249,0.04);
    }
    html { background: var(--black); }
    body {
      min-height: 100dvh;
      background: var(--black);
      color: var(--white);
      font-family: 'Lexend', 'Noto Sans KR', sans-serif;
      -webkit-font-smoothing: antialiased;
      padding-bottom: 60px;
    }

    /* Gold top bar */
    .top-bar { height: 3px; background: var(--gold); position: sticky; top: 0; z-index: 200; }

    /* Nav */
    nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      position: sticky; top: 3px; z-index: 100;
      background: var(--black);
    }
    .nav-logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.2rem; letter-spacing: 0.15em;
      color: var(--white);
    }
    .nav-logo span { color: var(--red); }
    .nav-right { font-family: 'Bebas Neue', sans-serif; font-size: 0.8rem; letter-spacing: 0.12em; color: var(--muted); }

    /* Tab bar */
    .tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      position: sticky; top: 60px; z-index: 90;
      background: var(--black);
    }
    .tab {
      flex: 1; padding: 14px 8px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 0.9rem; letter-spacing: 0.12em;
      color: var(--muted); text-align: center;
      cursor: pointer; border-bottom: 2px solid transparent;
      transition: color 0.2s, border-color 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    .tab.active { color: var(--white); border-bottom-color: var(--red); }

    /* Panels */
    .panel { display: none; padding: 20px; }
    .panel.active { display: block; }

    /* Section label */
    .section-label {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 0.75rem; letter-spacing: 0.2em;
      color: var(--gold); margin-bottom: 12px;
      display: flex; align-items: center; gap: 8px;
    }
    .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    /* Card */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 18px 16px;
      margin-bottom: 16px;
    }

    /* Fields */
    .field { margin-bottom: 14px; }
    .field:last-child { margin-bottom: 0; }
    label {
      display: block;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 0.75rem; letter-spacing: 0.15em;
      color: var(--muted); margin-bottom: 6px;
    }
    input[type="text"], input[type="url"],
    input[type="number"], input[type="date"], select {
      width: 100%;
      padding: 12px 13px;
      font-family: 'Lexend', sans-serif;
      font-size: 0.9rem;
      color: var(--white);
      background: rgba(249,249,249,0.05);
      border: 1px solid var(--border);
      border-radius: 4px;
      outline: none;
      -webkit-appearance: none;
      transition: border-color 0.2s;
      caret-color: var(--red);
    }
    input:focus, select:focus { border-color: var(--red); }
    input::placeholder { color: rgba(249,249,249,0.2); }
    select option { background: #2a2a2a; }
    .row { display: flex; gap: 10px; }
    .row .field { flex: 1; }

    /* Buttons */
    .btn {
      width: 100%; padding: 14px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1rem; letter-spacing: 0.12em;
      color: var(--white); background: var(--red);
      border: none; border-radius: 4px; cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:hover { opacity: 0.9; }
    .btn:active { transform: scale(0.98); }
    .btn.outline {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
    }
    .btn.outline:hover { border-color: var(--white); color: var(--white); }
    .btn.gold {
      background: transparent;
      border: 1px solid var(--gold);
      color: var(--gold);
    }
    .btn.sm { padding: 9px 16px; width: auto; font-size: 0.8rem; }

    /* URL preview */
    .url-preview {
      background: rgba(202,184,149,0.06);
      border: 1px solid rgba(202,184,149,0.2);
      border-radius: 4px; padding: 10px 12px;
      font-family: 'Lexend', monospace;
      font-size: 0.72rem; color: var(--gold);
      word-break: break-all; margin-bottom: 14px;
      display: none;
    }
    .url-preview strong {
      display: block; font-size: 0.65rem;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: rgba(202,184,149,0.6); margin-bottom: 4px;
    }

    /* QR output */
    .qr-wrap {
      display: none; flex-direction: column;
      align-items: center; gap: 16px; padding: 6px 0;
    }
    #qrCanvas { border-radius: 4px; }
    .qr-info { text-align: center; }
    .qr-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.2rem; letter-spacing: 0.1em;
      color: var(--white);
    }
    .qr-sub { font-size: 0.78rem; color: var(--muted); margin-top: 2px; }

    .btn-row { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
    .dl-btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 10px 20px; border-radius: 4px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 0.85rem; letter-spacing: 0.1em;
      color: var(--black); background: var(--gold);
      border: none; cursor: pointer; text-decoration: none;
      transition: opacity 0.2s;
    }
    .dl-btn:hover { opacity: 0.88; }
    .dl-btn.copy {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
    }
    .dl-btn.copy:hover { border-color: var(--white); color: var(--white); }

    /* Active session pill */
    .active-session {
      display: none;
      align-items: center; gap: 10px;
      background: rgba(204,0,0,0.1);
      border: 1px solid rgba(204,0,0,0.3);
      border-radius: 4px; padding: 12px 14px;
      margin-bottom: 16px;
    }
    .active-session .live-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--red); flex-shrink: 0;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.4;} }
    .active-session .as-label {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 0.72rem; letter-spacing: 0.14em; color: var(--muted);
    }
    .active-session .as-value {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 0.95rem; letter-spacing: 0.08em; color: var(--white);
    }

    /* History */
    .history-list { display: flex; flex-direction: column; gap: 8px; }
    .history-item {
      display: flex; align-items: center; justify-content: space-between;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 4px; padding: 12px 14px; gap: 10px;
    }
    .hi-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 0.95rem; letter-spacing: 0.08em; color: var(--white);
    }
    .hi-date { font-size: 0.72rem; color: var(--muted); margin-top: 2px; }
    .hi-actions { display: flex; gap: 6px; flex-shrink: 0; }
    .hi-btn {
      padding: 6px 12px; border-radius: 4px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 0.75rem; letter-spacing: 0.08em;
      cursor: pointer; border: 1px solid var(--border);
      color: var(--muted); background: transparent;
      transition: border-color 0.2s, color 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    .hi-btn:hover { border-color: var(--gold); color: var(--gold); }

    /* Size pills */
    .pill-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .pill {
      padding: 7px 14px; border-radius: 4px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 0.8rem; letter-spacing: 0.1em;
      border: 1px solid var(--border); color: var(--muted);
      cursor: pointer; transition: 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .pill.active { border-color: var(--red); color: var(--white); background: rgba(204,0,0,0.15); }

    /* Ping result */
    #pingResult { font-size: 0.8rem; margin-top: 8px; color: var(--muted); }

    /* Toast */
    .toast {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--gold); color: var(--black);
      padding: 10px 22px; border-radius: 4px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 0.85rem; letter-spacing: 0.1em;
      opacity: 0; transition: transform 0.3s, opacity 0.3s;
      pointer-events: none; z-index: 999; white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

    /* Empty state */
    .empty { font-size: 0.82rem; color: var(--muted); text-align: center; padding: 20px 0; }

    hr.div { border: none; border-top: 1px solid var(--border); margin: 16px 0; }
  </style>
</head>
<body>

<div class="top-bar"></div>

<nav>
  <div class="nav-logo">WAU<span>SAN</span>30</div>
  <div class="nav-right" id="navSession">ADMIN PANEL</div>
</nav>

<div class="tabs">
  <div class="tab active" onclick="switchTab('generate')">GENERATE</div>
  <div class="tab" onclick="switchTab('history')">HISTORY</div>
  <div class="tab" onclick="switchTab('settings')">SETTINGS</div>
</div>

<!-- ── GENERATE ── -->
<div class="panel active" id="tab-generate">

  <!-- Active session -->
  <div class="active-session" id="activeSession">
    <div class="live-dot"></div>
    <div>
      <div class="as-label">ACTIVE SESSION</div>
      <div class="as-value" id="asValue">—</div>
    </div>
  </div>

  <div class="section-label">SESSION INFO</div>
  <div class="card">
    <div class="row">
      <div class="field">
        <label>Session #</label>
        <input type="number" id="sessionNum" placeholder="30" min="1"/>
      </div>
      <div class="field">
        <label>Date</label>
        <input type="date" id="sessionDate"/>
      </div>
    </div>
    <div class="field">
      <label>Event / Group name</label>
      <input type="text" id="eventLabel" placeholder="WAUSAN30"/>
    </div>
  </div>

  <div class="section-label">QR PREVIEW</div>
  <div class="card">
    <div class="url-preview" id="urlPreview">
      <strong>QR will open</strong>
      <span id="urlText"></span>
    </div>
    <button class="btn" onclick="generateQR()">GENERATE QR CODE</button>
  </div>

  <!-- QR output -->
  <div class="card" id="qrCard" style="display:none">
    <div class="section-label" style="margin-bottom:16px">YOUR QR CODE</div>
    <div class="qr-wrap" id="qrWrap">
      <canvas id="qrCanvas"></canvas>
      <div class="qr-info">
        <div class="qr-title" id="qrLabel"></div>
        <div class="qr-sub" id="qrSub"></div>
      </div>
      <div class="btn-row">
        <a id="dlBtn" class="dl-btn" href="#">↓ DOWNLOAD PNG</a>
        <button class="dl-btn copy" onclick="copyURL()">⧉ COPY URL</button>
      </div>
    </div>
  </div>

</div>

<!-- ── HISTORY ── -->
<div class="panel" id="tab-history">
  <div class="section-label">PAST SESSIONS</div>
  <div class="card">
    <ul class="history-list" id="historyList" style="list-style:none">
      <li class="empty">No sessions yet.</li>
    </ul>
  </div>
  <button class="btn outline" onclick="clearHistory()" style="margin-top:4px">CLEAR HISTORY</button>
</div>

<!-- ── SETTINGS ── -->
<div class="panel" id="tab-settings">

  <div class="section-label">BACKEND</div>
  <div class="card">
    <div class="field">
      <label>Google Apps Script Web App URL</label>
      <input type="url" id="backendURL" placeholder="https://script.google.com/macros/s/.../exec"/>
    </div>
    <div class="field">
      <label>Landing page URL (instagram.html)</label>
      <input type="url" id="pageURL" placeholder="https://yoursite.com/instagram.html"/>
    </div>
    <button class="btn" onclick="saveSettings()">SAVE SETTINGS</button>
    <hr class="div"/>
    <div class="field">
      <label>Test connection</label>
      <button class="btn gold sm" onclick="testBackend()">PING BACKEND</button>
      <p id="pingResult"></p>
    </div>
  </div>

  <div class="section-label">QR SIZE</div>
  <div class="card">
    <div class="pill-row" id="sizePills">
      <div class="pill" data-val="256" onclick="setPill(this)">SMALL</div>
      <div class="pill active" data-val="320" onclick="setPill(this)">MEDIUM</div>
      <div class="pill" data-val="480" onclick="setPill(this)">LARGE</div>
      <div class="pill" data-val="640" onclick="setPill(this)">XL</div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
// ── STATE ──────────────────────────────────────────────────────────────────
let CFG = { backendURL:"", pageURL:"", qrSize:320, history:[] };

// ── INIT ───────────────────────────────────────────────────────────────────
window.addEventListener("DOMContentLoaded", () => {
  try { Object.assign(CFG, JSON.parse(localStorage.getItem("qr_admin_cfg") || "{}")); } catch(_){}
  // Default page URL to sibling instagram.html if not configured yet
  if (!CFG.pageURL) {
    CFG.pageURL = window.location.origin + window.location.pathname.replace(/admin\.html.*$/, "instagram.html");
  }
  applySettings();

  const today = new Date(), pad = n => String(n).padStart(2,"0");
  document.getElementById("sessionDate").value =
    today.getFullYear()+"-"+pad(today.getMonth()+1)+"-"+pad(today.getDate());

  const lastNum = CFG.history[0]?.num ? Number(CFG.history[0].num)+1 : "";
  if (lastNum) document.getElementById("sessionNum").value = lastNum;
  if (CFG.history[0]?.event) document.getElementById("eventLabel").value = CFG.history[0].event;

  ["sessionNum","sessionDate","eventLabel"].forEach(id =>
    document.getElementById(id).addEventListener("input", updatePreview));
  updatePreview();
  renderHistory();
});

function saveCFG() { localStorage.setItem("qr_admin_cfg", JSON.stringify(CFG)); }

// ── TABS ───────────────────────────────────────────────────────────────────
function switchTab(name) {
  const names = ["generate","history","settings"];
  document.querySelectorAll(".tab").forEach((el,i) => el.classList.toggle("active", names[i]===name));
  document.querySelectorAll(".panel").forEach(el => el.classList.remove("active"));
  document.getElementById("tab-"+name).classList.add("active");
  if (name==="history") renderHistory();
}

// ── URL ────────────────────────────────────────────────────────────────────
function buildURL() {
  const base  = (CFG.pageURL||"").trim();
  const date  = (document.getElementById("sessionDate").value||"").trim();
  const num   = (document.getElementById("sessionNum").value||"").trim();
  const event = (document.getElementById("eventLabel").value||"").trim();
  if (!base || !date) return null;
  try {
    const url = new URL(base);
    url.searchParams.set("date", date);
    if (num)          url.searchParams.set("session", num);
    if (event)        url.searchParams.set("event",   event);
    if (CFG.backendURL) url.searchParams.set("backend", CFG.backendURL);
    return url.toString();
  } catch(_) { return null; }
}

function updatePreview() {
  const url = buildURL();
  const box = document.getElementById("urlPreview");
  if (url) { document.getElementById("urlText").textContent = url; box.style.display = "block"; }
  else box.style.display = "none";
}

// ── GENERATE ───────────────────────────────────────────────────────────────
function generateQR() {
  const num   = (document.getElementById("sessionNum").value||"").trim();
  const date  = (document.getElementById("sessionDate").value||"").trim();
  const event = (document.getElementById("eventLabel").value||"").trim();
  const url   = buildURL();

  if (!CFG.pageURL) { toast("SET PAGE URL IN SETTINGS FIRST"); switchTab("settings"); return; }
  if (!date)        { toast("PLEASE ENTER A SESSION DATE"); return; }
  if (!url)         { toast("COULD NOT BUILD URL"); return; }

  const canvas = document.getElementById("qrCanvas");
  const size   = CFG.qrSize || 320;

  // Always set canvas dimensions upfront (avoids 0×0 when parent is hidden)
  canvas.width  = size;
  canvas.height = size;

  // Show the card first so canvas has a layout context
  document.getElementById("qrCard").style.display = "block";
  document.getElementById("qrWrap").style.display  = "flex";

  const dlFilename = "qr_"+(num?"session"+num:date)+".png";

  if (typeof QRious !== "undefined") {
    // qrious is synchronous — draws immediately, no callback needed
    new QRious({
      element:     canvas,
      value:       url,
      size:        size,
      foreground:  "#F9F9F9",  // white modules on dark background
      background:  "#1C1C1C",
      padding:     12,
      level:       "H",        // high error correction
    });
    bindDownload(canvas, dlFilename);
  } else { fallbackQR(url, canvas, size, dlFilename); }

  document.getElementById("qrLabel").textContent = num ? (event||"SESSION")+" #"+num : (event||date);
  document.getElementById("qrSub").textContent   = num ? date : "";

  // Active session
  const label = [num&&("SESSION #"+num), date].filter(Boolean).join("  ·  ");
  document.getElementById("asValue").textContent = label;
  document.getElementById("activeSession").style.display = "flex";
  document.getElementById("navSession").textContent = label;

  document.getElementById("qrCard").scrollIntoView({ behavior:"smooth", block:"center" });

  CFG.history.unshift({ num, date, event, url, ts: Date.now() });
  if (CFG.history.length > 20) CFG.history = CFG.history.slice(0, 20);
  saveCFG();
}

function fallbackQR(text, canvas, size, filename) {
  canvas.width  = size;
  canvas.height = size;
  const img = new Image(); img.crossOrigin = "anonymous";
  img.src = "https://chart.googleapis.com/chart?cht=qr&chs="+size+"x"+size
           +"&chl="+encodeURIComponent(text)+"&choe=UTF-8";
  img.onload = () => {
    canvas.getContext("2d").drawImage(img,0,0,size,size);
    bindDownload(canvas, filename);
  };
  img.onerror = () => {
    const ctx = canvas.getContext("2d");
    ctx.fillStyle = "#1C1C1C";
    ctx.fillRect(0,0,size,size);
    ctx.fillStyle = "#CAB895";
    ctx.font = "bold 13px sans-serif";
    ctx.textAlign = "center";
    ctx.fillText("QR load failed — check internet", size/2, size/2 - 8);
    ctx.fillText("or install the page on HTTPS", size/2, size/2 + 12);
  };
}

// Convert canvas to a Blob URL and wire up the download button.
// Blob URLs work on all browsers including Safari/iOS (data URLs don't download there).
function bindDownload(canvas, filename) {
  const btn = document.getElementById("dlBtn");
  // Remove old onclick if any
  btn.onclick = null;
  btn.onclick = (e) => {
    e.preventDefault();
    canvas.toBlob(blob => {
      if (!blob) { toast("COULD NOT CREATE IMAGE"); return; }
      const url = URL.createObjectURL(blob);
      const a   = document.createElement("a");
      a.href     = url;
      a.download = filename || "qr.png";
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(url), 5000);
    }, "image/png");
  };
}

// ── HISTORY ────────────────────────────────────────────────────────────────
function renderHistory() {
  const list = document.getElementById("historyList");
  if (!CFG.history.length) { list.innerHTML = '<li class="empty">No sessions yet.</li>'; return; }
  list.innerHTML = CFG.history.map((h,i) => `
    <li class="history-item">
      <div>
        <div class="hi-name">${h.num?(h.event||"SESSION")+" #"+h.num:(h.event||"SESSION")}${h.date?"  ·  "+h.date:""}</div>
        <div class="hi-date">${new Date(h.ts).toLocaleString()}</div>
      </div>
      <div class="hi-actions">
        <button class="hi-btn" onclick="reloadSession(${i})">QR</button>
        <button class="hi-btn" onclick="copyHistoryURL(${i})">COPY</button>
      </div>
    </li>`).join("");
}

function reloadSession(i) {
  const h = CFG.history[i]; if (!h) return;
  if (h.num)   document.getElementById("sessionNum").value  = h.num;
  if (h.date)  document.getElementById("sessionDate").value = h.date;
  if (h.event) document.getElementById("eventLabel").value  = h.event;
  switchTab("generate"); updatePreview();
  setTimeout(generateQR, 80);
}
function copyHistoryURL(i) {
  const h = CFG.history[i]; if (!h) return;
  navigator.clipboard.writeText(h.url).then(()=>toast("URL COPIED")).catch(()=>toast("COPY FAILED"));
}
function clearHistory() {
  if (!confirm("Clear all session history?")) return;
  CFG.history=[]; saveCFG(); renderHistory();
}

// ── SETTINGS ───────────────────────────────────────────────────────────────
function applySettings() {
  document.getElementById("backendURL").value = CFG.backendURL||"";
  document.getElementById("pageURL").value    = CFG.pageURL||"";
  document.querySelectorAll("#sizePills .pill").forEach(el =>
    el.classList.toggle("active", Number(el.dataset.val)===CFG.qrSize));
  updatePreview();
}
function setPill(el) {
  el.closest(".pill-row").querySelectorAll(".pill").forEach(p=>p.classList.remove("active"));
  el.classList.add("active");
}
function saveSettings() {
  CFG.backendURL = document.getElementById("backendURL").value.trim();
  CFG.pageURL    = document.getElementById("pageURL").value.trim();
  const a = document.querySelector("#sizePills .pill.active");
  CFG.qrSize = a ? Number(a.dataset.val) : 320;
  saveCFG(); updatePreview(); toast("SETTINGS SAVED");
}

// JSONP helper
function jsonpGet(url, params) {
  return new Promise((resolve, reject) => {
    const cb = "__gasCb"+Date.now();
    const t = setTimeout(()=>{ delete window[cb]; script.remove(); reject(new Error("TIMEOUT")); }, 10000);
    window[cb] = (data)=>{ clearTimeout(t); delete window[cb]; script.remove(); resolve(data); };
    const u = new URL(url);
    Object.entries(params||{}).forEach(([k,v])=>u.searchParams.set(k,v));
    u.searchParams.set("callback", cb);
    const script = document.createElement("script");
    script.src = u.toString();
    script.onerror = ()=>{ clearTimeout(t); delete window[cb]; reject(new Error("LOAD FAILED")); };
    document.head.appendChild(script);
  });
}

async function testBackend() {
  const url = document.getElementById("backendURL").value.trim();
  const res = document.getElementById("pingResult");
  if (!url) { res.textContent = "No backend URL entered."; return; }
  res.textContent = "Pinging…"; res.style.color = "var(--muted)";
  try {
    const d = await jsonpGet(url);
    if (d.status === "ok") { res.style.color="#22c55e"; res.textContent="✓ CONNECTED — "+( d.message||"OK"); }
    else { res.style.color="var(--red)"; res.textContent="✗ "+(d.message||"ERROR"); }
  } catch(e) { res.style.color="var(--red)"; res.textContent="✗ "+e.message; }
}

// ── UTILS ──────────────────────────────────────────────────────────────────
function copyURL() {
  const url = buildURL();
  if (!url) { toast("FILL IN THE FIELDS FIRST"); return; }
  navigator.clipboard.writeText(url).then(()=>toast("URL COPIED")).catch(()=>toast("COPY FAILED"));
}

let _tt;
function toast(msg) {
  const el = document.getElementById("toast");
  el.textContent = msg; el.classList.add("show");
  clearTimeout(_tt);
  _tt = setTimeout(()=>el.classList.remove("show"), 2200);
}
